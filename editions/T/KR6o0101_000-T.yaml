body:
  text: 起信論海東疏刊行序釋於大乘起信論之疏振古凡有三品曰法藏曰慧遠曰元曉世謂之本論三師就中先二疏行于世年已尚矣是機緣方熟也今斯疏唯聞有其本更不閱之者歲亦深焉惟時宜未合也所謂僧傳清涼觀公於淮南法藏受海東起信疏義云個書高出于諸師上者以應知也我之論章中往往引用而未見其全釋所以慵研覈其釋之始末因茲同門負帙者各不能無遺憾矣近來印氏某語余言或人呪這錦本乃許於刻梓而流行願垂考點其言至切余復想遇時根適至喜此疏入手而點頭肯受便捧讀訂校雖然天稟駑駘不獲罄力奚敢覃思俯祈達人幸為政諸元祿九龍飛丙子之秋日洛東智積門下覺眼謹誌
