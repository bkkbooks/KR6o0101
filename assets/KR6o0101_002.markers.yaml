  - {type: line-break, offset: 12319, content: '', id: KR6o0101_T_002-0224c05, ed: T, 'n': 0224c05}
  - {type: line-break, offset: 12319, content: '', id: KR6o0101_T_002-0224c06, ed: T, 'n': 0224c06}
  - {type: line-break, offset: 12319, content: '', id: KR6o0101_T_002-0224c07, ed: T, 'n': 0224c07}
  - {type: line-break, offset: 12319, content: '', id: KR6o0101_T_002-0224c08, ed: T, 'n': 0224c08}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 三智慧觀察。言}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 當勤正念不取不著者。總顯三中前之二法。}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 今於此中大乘止門。唯修理定。更無別趣。故}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 初定研。并依本修。更無別法。所以今說當依}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 本修大乘止門正念而住。不取不著者。邪不}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 干正。自然退沒。當知若心取著。則棄正而成}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 邪。若不取著。則因邪而顯正。是知邪正之}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 分。要在著與不著。不著之者。無障不離。故}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 言遠離是諸業障也。應知外道以下。第三簡}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 其真偽。於中有二。初舉內外以別邪正。先邪。}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 後正。文相可知。若諸以下。次對理事以簡真}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 偽。於中初顯理定是真。行者要修真如三昧。}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 方入種性不退位中。除此更無能入之道。故}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 言不習無有是處。然種性之位有其二門。一}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 十三住門。初種性住。種性者。無始來有。非修}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 所得。義出瑜伽及地持論。二六種性門。初習}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 種性。次性種性者。位在三賢。因習所成。出本}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 業經及仁王經。於中委悉。如一道義中廣說}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 也。今此中言如來種性者。說第二門習種性}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 位也。以修世間以下。次顯事定之偽。謂不}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 淨觀安那槃念等。皆名世間諸三昧也。若人}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 不依真如三昧。直修此等事三昧者。隨所入}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 境。不離取著。取著法者。必著於我。故屬三}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 界。與外道共也。如智度論云。諸法實相。其餘}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 一切皆是魔事。此之謂也。上來第三明魔事}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 竟。復次以下。第四利益。後世利益。不可具}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 陳。故今略示現在利益。總標。別顯。文相可}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 知。別明止門竟在於前。復次以下第二明觀。}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 於中有三。初明修觀之意。次顯修觀之法。其}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 第三者。總結勸修。第二之中。顯四種觀。一法}
  - {type: variant, offset: 12319, length: 0, content: X45n0757_p0238b24, 大: 相觀。謂無}
