  - {type: variant, offset: 13256, length: 489, content: 第三智慧觀察。言當勤正念不取不著者。總顯三中前之二法。今於此中大乘止門。唯修理定。更無別趣。故初定研。並依本修。更無別法。所以今說當依本修大乘止門正念而住。不取不著者。邪不幹正。自然退沒。當知若心取著。則棄正而成邪。若不取著。則因邪而顯正。是知邪正之分。要在著與不著。不著之者。無障不離。故言遠離是諸業障也。應知外道以下。第三簡其真偽。於中有二。初舉內外以別邪正。先邪。後正。文相可知。若諸以下。次對理事以簡真偽。於中初顯理定是真。行者要修真如三昧。方入種性不退位中。除此更無能入之道。故言不習無有是處。然種性之位有其二門。一十三住門。初種性住。種性者。無始來有。非修所得。義出瑜伽及地持論。二六種性門。初習種性。次性種性者。位在三賢。因習所成。出本業經及仁王經。於中委悉。如一道義中廣說也。今此中言如來種性者。說第二門習種性位也。以修世間以下。次顯事定之偽。謂不淨觀安那槃念等。皆名世間諸三昧也。若人不依真如三昧。直修此等事三昧者。隨所入境。不離取著。取著法者。必著於我。故屬三界。與外道共也。如智度論云。諸法實相。其餘一切皆是魔事。此之謂也。上來第三明魔事竟。第四利益。後世利益。不可具陳。故今略示現在利益。總標。別顯。文相可知。別明止門竟在於前。第二明觀。於中有三。初明修觀之意。次顯修觀之法。其第三者。總結勸修。第二之中。顯四種觀。一法相觀。謂X45n0757_p0239b01-p0240a04, 大: ''}
